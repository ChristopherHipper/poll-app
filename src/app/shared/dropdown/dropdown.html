<ng-template #menu>
  <div class="dropdown__menu" cdkMenu>
    @for (category of categries(); track $index) {
    <button (click)="selectCategory(category)" cdkMenuItemCheckbox class="dropdown__item">
      {{category}}
    </button>
    }
  </div>
</ng-template>
