<section class="ending-soon-section">
    @for (survey of endingSoonSurveys(); track survey.id) {
    <div class="card"  [routerLink]="['survey', survey.id]" role="link">
        <div>
            <p class="card__category">{{ survey.category }}</p>
            <h4 class="card__title">{{ survey.title }}</h4>
        </div>
        <p class="card__date">Ends in {{ getRestDays(survey.end_date)}}{{getDay(survey.end_date)}}</p>
    </div>
    }


</section>
