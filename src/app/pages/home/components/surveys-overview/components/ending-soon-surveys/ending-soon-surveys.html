<section class="ending-soon-section">
    @for (survey of surveys(); track survey.id) {
    @if (isEndingSoon(survey.rest_days)) { <div class="ending-soon-card" [routerLink]="['survey', survey.id]"
        role="link">
        <div>
            <p class="ending-soon-card__category">{{ survey.category }}</p>
            <h4 class="ending-soon-card__title">{{ survey.title }}</h4>
        </div>
        <p class="ending-soon-card__date">Ends in {{ survey.rest_days}}{{getDay(survey.rest_days)}}</p>
        </div>
        }
        }
</section>
