<main class="new-survey-wrapper">
    <figure class="logo">
        <app-logo [variant]="'purple'"></app-logo>
    </figure>
    <section class="survey-content">
        <header class="form-header">
            <div>
                <app-status [status]="'Draft'"></app-status>
                <h2 class="form-headline">Create new survey</h2>
            </div>
            <app-cancel-button>
                <button fxHide.xs class="btn btn--cancel" [routerLink]="''">
                    <p class="btn-text">Cancel</p>

                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M6.575 7.975L1.675 12.875C1.49167 13.0583 1.25833 13.15 0.975 13.15C0.691667 13.15 0.458333 13.0583 0.275 12.875C0.0916667 12.6917 0 12.4583 0 12.175C0 11.8917 0.0916667 11.6583 0.275 11.475L5.175 6.575L0.275 1.675C0.0916667 1.49167 0 1.25833 0 0.975C0 0.691667 0.0916667 0.458333 0.275 0.275C0.458333 0.0916667 0.691667 0 0.975 0C1.25833 0 1.49167 0.0916667 1.675 0.275L6.575 5.175L11.475 0.275C11.6583 0.0916667 11.8917 0 12.175 0C12.4583 0 12.6917 0.0916667 12.875 0.275C13.0583 0.458333 13.15 0.691667 13.15 0.975C13.15 1.25833 13.0583 1.49167 12.875 1.675L7.975 6.575L12.875 11.475C13.0583 11.6583 13.15 11.8917 13.15 12.175C13.15 12.4583 13.0583 12.6917 12.875 12.875C12.6917 13.0583 12.4583 13.15 12.175 13.15C11.8917 13.15 11.6583 13.0583 11.475 12.875L6.575 7.975Z"
                            fill="#FEFDFF" />
                    </svg>
                </button>
            </app-cancel-button>
        </header>

        <form class="survey-form" [formGroup]="surveyForm" (ngSubmit)="formSubmit()">
            @if(showSuccessMessage()){
            <div class="success-wrapper">
                <div class="success-msg">Your survey is now published!</div>
            </div>
            }
            <fieldset>
                @if (invalidName){
                <label class="error" for="name">Survey name is required</label>
                } @else{
                <label for="name">
                    Survey name
                    <app-clear-button (click)="clearField('name')"></app-clear-button>
                </label>
                }
                <div>
                    <input class="inputfield" id="name" type="text" formControlName="name" />
                </div>
                <div class="category-date-wrapper">
                    <app-dropdown (outputCategory)="getCategory($event)"></app-dropdown>
                    <div>
                        <label class="label-date" for="date">
                            Set end date (optional)
                            <app-clear-button (click)="clearField('date')"></app-clear-button>
                        </label>
                        <div>
                            <input id="date" type="date" formControlName="date" />
                        </div>
                    </div>
                </div>
            </fieldset>

            <fieldset>
                <label for="description">
                    Description text (optional)
                    <app-clear-button (click)="clearField('description')"></app-clear-button>
                </label>
                <div>
                    <textarea name="description" id="description" formControlName="description"></textarea>
                </div>
            </fieldset>


            @for (question of questions(); track question; let i = $index) {
            <fieldset>
                <label>
                    {{i+1}} Question
                    <app-clear-button (click)="removeQuestion(i)"></app-clear-button>
                </label>
                <div>
                    <input class="inputfield" id="" type="text" />
                </div>

                <label>
                    Answers
                </label>
                <ul>
                    <li>
                        <label for="">A</label>
                        <input class="inputfield" id="" type="text" />
                    </li>

                    <li>
                        <label for="">B</label>
                        <input class="inputfield" id="" type="text" />
                    </li>

                </ul>
            </fieldset>
            }

            <button (click)="increaseQuestions()" class="btn btn--cancel add-question-btn">
                Add next question
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M9 11V14C9 14.2833 9.09583 14.5208 9.2875 14.7125C9.47917 14.9042 9.71667 15 10 15C10.2833 15 10.5208 14.9042 10.7125 14.7125C10.9042 14.5208 11 14.2833 11 14V11H14C14.2833 11 14.5208 10.9042 14.7125 10.7125C14.9042 10.5208 15 10.2833 15 10C15 9.71667 14.9042 9.47917 14.7125 9.2875C14.5208 9.09583 14.2833 9 14 9H11V6C11 5.71667 10.9042 5.47917 10.7125 5.2875C10.5208 5.09583 10.2833 5 10 5C9.71667 5 9.47917 5.09583 9.2875 5.2875C9.09583 5.47917 9 5.71667 9 6V9H6C5.71667 9 5.47917 9.09583 5.2875 9.2875C5.09583 9.47917 5 9.71667 5 10C5 10.2833 5.09583 10.5208 5.2875 10.7125C5.47917 10.9042 5.71667 11 6 11H9ZM10 20C8.61667 20 7.31667 19.7375 6.1 19.2125C4.88333 18.6875 3.825 17.975 2.925 17.075C2.025 16.175 1.3125 15.1167 0.7875 13.9C0.2625 12.6833 0 11.3833 0 10C0 8.61667 0.2625 7.31667 0.7875 6.1C1.3125 4.88333 2.025 3.825 2.925 2.925C3.825 2.025 4.88333 1.3125 6.1 0.7875C7.31667 0.2625 8.61667 0 10 0C11.3833 0 12.6833 0.2625 13.9 0.7875C15.1167 1.3125 16.175 2.025 17.075 2.925C17.975 3.825 18.6875 4.88333 19.2125 6.1C19.7375 7.31667 20 8.61667 20 10C20 11.3833 19.7375 12.6833 19.2125 13.9C18.6875 15.1167 17.975 16.175 17.075 17.075C16.175 17.975 15.1167 18.6875 13.9 19.2125C12.6833 19.7375 11.3833 20 10 20ZM10 18C12.2333 18 14.125 17.225 15.675 15.675C17.225 14.125 18 12.2333 18 10C18 7.76667 17.225 5.875 15.675 4.325C14.125 2.775 12.2333 2 10 2C7.76667 2 5.875 2.775 4.325 4.325C2.775 5.875 2 7.76667 2 10C2 12.2333 2.775 14.125 4.325 15.675C5.875 17.225 7.76667 18 10 18Z"
                        fill="#FEFDFF" />
                </svg>
            </button>

        </form>
    </section>
</main>
